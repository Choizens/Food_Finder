<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/admin_dashboard.css">
    <link rel="stylesheet" href="style/admin_users.css">
    <script src="https://kit.fontawesome.com/1165876da6.js" crossorigin='anonymous'></script>
    <title>Flavoursome - Pending Requests (Super Admin)</title>
    <style>
        .req-page { padding: 24px; max-width: 1200px; margin: 0 auto; }
        .req-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; gap: 12px; flex-wrap: wrap; }
        .req-header h2 { font-size: 1.5rem; font-weight: 700; color: var(--text-primary, #1e293b); display: flex; align-items: center; gap: 10px; }
        .req-header h2 i { color: #8b5cf6; }
        .req-badge { background: #8b5cf6; color: #fff; font-size: 0.75rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
        .req-refresh { background: #8b5cf6; color: #fff; border: none; border-radius: 8px; padding: 8px 16px; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; transition: background 0.2s; }
        .req-refresh:hover { background: #7c3aed; }
        .req-empty { text-align: center; padding: 60px 20px; color: #64748b; }
        .req-empty i { font-size: 3rem; margin-bottom: 14px; color: #cbd5e1; }
        .req-empty h3 { margin: 0 0 8px; font-size: 1.1rem; color: #475569; }
        .req-table-wrap { background: #fff; border-radius: 12px; box-shadow: 0 1px 8px rgba(0,0,0,.08); overflow: hidden; }
        .req-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        .req-table th { background: #f8fafc; color: #64748b; font-weight: 600; text-transform: uppercase; font-size: 0.72rem; letter-spacing: .04em; padding: 12px 16px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        .req-table td { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; color: #1e293b; }
        .req-table tr:last-child td { border-bottom: none; }
        .req-table tr:hover td { background: #f8fafc; }
        .req-user-name { font-weight: 600; }
        .req-user-sub { font-size: 0.78rem; color: #64748b; }
        .req-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #8b5cf6, #6366f1); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 0.9rem; flex-shrink: 0; }
        .req-user-cell { display: flex; align-items: center; gap: 12px; }
        .req-status-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; background: #fef9c3; color: #854d0e; }
        .req-actions { display: flex; gap: 8px; }
        .btn-approve { background: #10b981; color: #fff; border: none; border-radius: 8px; padding: 7px 14px; cursor: pointer; font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; gap: 6px; transition: background 0.2s; }
        .btn-approve:hover { background: #059669; }
        .btn-reject { background: #ef4444; color: #fff; border: none; border-radius: 8px; padding: 7px 14px; cursor: pointer; font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; gap: 6px; transition: background 0.2s; }
        .btn-reject:hover { background: #dc2626; }
        .btn-approve:disabled, .btn-reject:disabled { opacity: .5; cursor: not-allowed; }
        #reqToast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 10px; color: #fff; font-size: 0.875rem; font-weight: 600; z-index: 9999; display: none; }
        #reqToast.success { background: #10b981; }
        #reqToast.error { background: #ef4444; }
        .req-loading { text-align: center; padding: 48px; color: #64748b; }
        .req-spinner { width: 36px; height: 36px; border: 4px solid #e2e8f0; border-top-color: #8b5cf6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <div class="sidebar-logo-icon"><i class="fas fa-utensils"></i></div>
            <div class="sidebar-logo-text">
                <span class="sidebar-logo-name">Flavoursome</span>
                <span class="sidebar-logo-tagline">Super Admin</span>
            </div>
        </div>
        <nav class="sidebar-menu">
            <div class="sidebar-menu-section" style="display:none;">
                <h4 class="sidebar-menu-title">Main</h4>
            </div>
            <div class="sidebar-menu-section">
                <h4 class="sidebar-menu-title">Management</h4>
                <ul class="sidebar-menu-list">
                    <li class="sidebar-menu-item">
                        <a href="super_admin_dashboard.html#users" class="sidebar-menu-link">
                            <i class="fas fa-users"></i><span>User Management</span>
                        </a>
                    </li>
                    <li class="sidebar-menu-item">
                        <a href="super_request.html" class="sidebar-menu-link active">
                            <i class="fas fa-user-clock"></i>
                            <span>Pending Requests</span>
                            <span class="sidebar-menu-badge" id="sidebarBadge" style="display:none;">0</span>
                        </a>
                    </li>
                    <li class="sidebar-menu-item">
                        <a href="super_admin_dashboard.html#recipes" class="sidebar-menu-link">
                            <i class="fas fa-tasks"></i><span>Recipe Requests</span>
                        </a>
                    </li>
                    <li class="sidebar-menu-item">
                        <a href="super_admin_dashboard.html#logs" class="sidebar-menu-link">
                            <i class="fas fa-clipboard-list"></i><span>Activity Logs</span>
                        </a>
                    </li>
                    <li class="sidebar-menu-item">
                        <a href="super_admin_dashboard.html#settings" class="sidebar-menu-link">
                            <i class="fas fa-cog"></i><span>System Settings</span>
                        </a>
                    </li>
                </ul>
            </div>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-user">
                <div class="sidebar-user-avatar"><i class="fas fa-user-shield"></i></div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="sidebarUsername">Super Admin</div>
                    <div class="sidebar-user-role">Super Administrator</div>
                </div>
            </div>
        </div>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Content -->
    <div class="main-wrapper">
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-title">
                    <button class="mobile-menu-toggle" id="mobileMenuToggle"><i class="fas fa-bars"></i></button>
                    <div>
                        <h1>Pending Requests</h1>
                        <div class="nav-breadcrumb">
                            <span>Home</span>
                            <i class="fas fa-chevron-right"></i>
                            <span>Pending Requests</span>
                        </div>
                    </div>
                </div>
                <div class="nav-actions">
                    <div class="notification-badge">
                        <i class="fas fa-bell"></i>
                        <span class="badge" id="notificationCount">0</span>
                    </div>
                    <button class="profile-btn"><i class="fas fa-user-shield"></i><span id="navUsername">Super Admin</span></button>
                    <button class="logout-btn-red" onclick="handleLogout()">
                        <i class="fas fa-sign-out-alt"></i><span>Logout</span>
                    </button>
                </div>
            </div>
        </nav>

        <div class="req-page">
            <div class="req-header">
                <h2><i class="fas fa-user-clock"></i> Pending Account Requests <span class="req-badge" id="totalBadge">0</span></h2>
                <button class="req-refresh" onclick="loadRequests()"><i class="fas fa-sync-alt"></i> Refresh</button>
            </div>
            <div id="reqContent">
                <div class="req-loading">
                    <div class="req-spinner"></div>
                    Loading pending requests...
                </div>
            </div>
        </div>
    </div>

    <div id="reqToast"></div>

    <script src="Jscript/admin_dashboard.js"></script>
    <script>
        async function loadRequests() {
            document.getElementById('reqContent').innerHTML = `
                <div class="req-loading">
                    <div class="req-spinner"></div>
                    Loading pending requests...
                </div>`;
            try {
                const res  = await fetch('Phpfile/get_user_requests.php?action=get_pending&scope=super_admin');
                const data = await res.json();
                if (!data.success) throw new Error(data.message);
                renderTable(data.users, data.total);
            } catch(e) {
                document.getElementById('reqContent').innerHTML =
                    `<div class="req-empty"><i class="fas fa-exclamation-triangle"></i><h3>Failed to load</h3><p>${e.message}</p></div>`;
            }
        }

        function renderTable(users, total) {
            document.getElementById('totalBadge').textContent = total;
            const badge = document.getElementById('sidebarBadge');
            badge.textContent = total;
            badge.style.display = total > 0 ? 'inline-block' : 'none';

            if (!users || users.length === 0) {
                document.getElementById('reqContent').innerHTML = `
                    <div class="req-empty">
                        <i class="fas fa-check-circle" style="color:#10b981;"></i>
                        <h3>All caught up!</h3>
                        <p>No pending registration requests at the moment.</p>
                    </div>`;
                return;
            }

            const rows = users.map(u => {
                const initials = (u.fname?.[0] || '') + (u.lname?.[0] || '');
                const fullName = [u.fname, u.middle, u.lname, u.exname].filter(Boolean).join(' ');
                const address  = [u.barangay, u.city, u.province].filter(Boolean).join(', ') || '—';
                return `<tr>
                    <td>
                        <div class="req-user-cell">
                            <div class="req-avatar">${initials.toUpperCase()}</div>
                            <div>
                                <div class="req-user-name">${fullName}</div>
                                <div class="req-user-sub">@${u.username}</div>
                            </div>
                        </div>
                    </td>
                    <td>${u.emailadd}</td>
                    <td>${u.sex || '—'}</td>
                    <td>${address}</td>
                    <td><span class="req-status-badge"><i class="fas fa-clock"></i> Pending</span></td>
                    <td>
                        <div class="req-actions">
                            <button class="btn-approve" onclick="approveUser(${u.id}, this)">
                                <i class="fas fa-check"></i> Approve
                            </button>
                            <button class="btn-reject" onclick="rejectUser(${u.id}, this)">
                                <i class="fas fa-times"></i> Reject
                            </button>
                        </div>
                    </td>
                </tr>`;
            }).join('');

            document.getElementById('reqContent').innerHTML = `
                <div class="req-table-wrap">
                    <table class="req-table">
                        <thead>
                            <tr>
                                <th>User Information</th>
                                <th>Email</th>
                                <th>Sex</th>
                                <th>Address</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>`;
        }

        async function approveUser(userId, btn) {
            setRowLoading(btn, true);
            try {
                const fd = new FormData();
                fd.append('action', 'approve');
                fd.append('user_id', userId);
                fd.append('scope', 'super_admin');
                const res  = await fetch('Phpfile/get_user_requests.php', { method: 'POST', body: fd });
                const data = await res.json();
                if (!data.success) throw new Error(data.message);
                showToast(data.message, 'success');
                setTimeout(loadRequests, 800);
            } catch(e) {
                showToast(e.message, 'error');
                setRowLoading(btn, false);
            }
        }

        async function rejectUser(userId, btn) {
            if (!confirm('Reject and delete this registration? This cannot be undone.')) return;
            setRowLoading(btn, true);
            try {
                const fd = new FormData();
                fd.append('action', 'reject');
                fd.append('user_id', userId);
                fd.append('scope', 'super_admin');
                const res  = await fetch('Phpfile/get_user_requests.php', { method: 'POST', body: fd });
                const data = await res.json();
                if (!data.success) throw new Error(data.message);
                showToast(data.message, 'success');
                setTimeout(loadRequests, 800);
            } catch(e) {
                showToast(e.message, 'error');
                setRowLoading(btn, false);
            }
        }

        function setRowLoading(btn, loading) {
            btn.closest('tr').querySelectorAll('button').forEach(b => b.disabled = loading);
        }

        function showToast(msg, type) {
            const t = document.getElementById('reqToast');
            t.textContent = msg;
            t.className   = type;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3500);
        }

        function handleLogout() {
            if (!confirm('Are you sure you want to log out?')) return;
            fetch('Phpfile/logout.php', { method: 'POST' })
                .finally(() => { window.location.href = 'home.html'; });
        }

        document.getElementById('mobileMenuToggle')?.addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        });
        document.getElementById('sidebarOverlay')?.addEventListener('click', () => {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('sidebarOverlay').classList.remove('active');
        });

        fetch('Phpfile/admin_users.php?action=get_current_user&scope=super_admin')
            .then(r => r.json()).then(d => {
                if (d.success) {
                    document.getElementById('sidebarUsername').textContent = d.username;
                    document.getElementById('navUsername').textContent = d.username;
                }
            }).catch(() => {});

        loadRequests();
    </script>
</body>
</html>
