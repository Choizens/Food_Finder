    <link rel="stylesheet" href="style/base.css">

<body>
    <!-- Header Section -->
    <header class="hed">
        <div>
            <div class="Nav">
                <ul>
                    <li><a href="#homes">Home</a></li>
                    <li> <a href="#" onclick="document.getElementById('modal').style.display='block'">Login</a></li>
                </ul>
            </div>
        </div>
        <div class="logo">
            <label><p>Flavoursome Recipe</p></label>
        </div>
    </header>

    <!-- Main Content -->
    <main class="backs">

        <!-- Login Form -->
        <form class="modal-content animate" action="Phpfile/logs.php" method="POST" onsubmit="handleLogin(event)">
            <h1>Login</h1>
            <div id="countdown-display" class="count"></div>
            
            <div class="field">
                <input type="text" name="username" id="username" required minlength="3" maxlength="12">
                <label>Username</label>
            </div>
    
            <div class="field">
                <input type="password" id="password" name="password" required>
                <label>Password</label>
            </div>
    
            <p id="mess" class="messages"></p>
    
            <div class="show-password">
                <input type="checkbox" id="show-password" class="box" onclick="togglePasswordVisibility()">
                <label for="show-password">Show Password</label>
            </div><br>
    
            <div class="yin">
                <input type="submit" id="login-button" value="Login">
            </div><br>
    
            <div id="forgot-password-msg" style="display: none;">
                Forgot Password? <a href="ForgotPassword.html" class="reset">Click here to reset.</a>
            </div><br>
    
            <div class="sign">
                Don't have an account? <a href="Register.html" id="register-link">Sign-up</a>
            </div>
        </form>
    </main>
